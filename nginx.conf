server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  charset utf-8;

  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  # Astro emits hashed assets in /_astro/* — long-cache them aggressively.
  location ^~ /_astro/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|webp|gif|ico|mp4|webm)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-store, must-revalidate";
  }

  location / {
    try_files $uri $uri/ $uri.html $uri/index.html =404;
  }

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml text/plain;
}
