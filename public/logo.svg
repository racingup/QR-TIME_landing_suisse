<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" role="img" aria-label="qrtime.ch">
  <!-- Icon -->
  <g transform="translate(6 4)">
    <!-- Ribbon / infinity stroke around the clock -->
    <path d="M18 22 C 10 6, 38 -2, 44 18 C 50 38, 18 44, 12 32 C 6 20, 40 10, 50 28 C 60 46, 22 52, 14 38"
          fill="none" stroke="#1F5F82" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Clock face -->
    <circle cx="36" cy="36" r="22" fill="#FFFFFF" stroke="#1F5F82" stroke-width="3.5"/>

    <!-- QR pattern inside clock -->
    <g fill="#1F5F82">
      <rect x="22" y="34" width="3" height="3"/>
      <rect x="26" y="34" width="3" height="3"/>
      <rect x="22" y="38" width="3" height="3"/>
      <rect x="30" y="38" width="3" height="3"/>
      <rect x="26" y="42" width="3" height="3"/>
      <rect x="30" y="42" width="3" height="3"/>
      <rect x="22" y="46" width="3" height="3"/>
      <rect x="30" y="46" width="3" height="3"/>
      <rect x="26" y="50" width="3" height="3"/>
    </g>

    <!-- Clock hands -->
    <line x1="36" y1="36" x2="36" y2="22" stroke="#1F5F82" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="36" y1="36" x2="46" y2="40" stroke="#1F5F82" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="36" cy="36" r="1.8" fill="#1F5F82"/>

    <!-- Location pin (top-right) -->
    <path d="M54 8 C 60 8, 64 12, 64 17 C 64 23, 54 31, 54 31 C 54 31, 44 23, 44 17 C 44 12, 48 8, 54 8 Z"
          fill="#1F5F82"/>
    <circle cx="54" cy="16.5" r="3.2" fill="#FFFFFF"/>

    <!-- Green check -->
    <path d="M24 56 L34 66 L58 42" fill="none" stroke="#7BB342" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="84" y="52" fill="#1F5F82"
        font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-weight="600" font-size="34" letter-spacing="-0.5">qrtime.ch</text>
</svg>
